<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="dayNight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF6E0"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <marker id="arr3" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E6FB7"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="380" rx="16" fill="url(#dayNight)"/>

  <!-- DAY side -->
  <text x="180" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#8a6d1f">☀️ During the day</text>
  <text x="180" y="74" text-anchor="middle" font-size="13" fill="#6b5618">you collect messy, jumbled</text>
  <text x="180" y="92" text-anchor="middle" font-size="13" fill="#6b5618">experiences</text>

  <!-- messy scattered dots (jumbled memories) -->
  <g fill="#C99A2E">
    <circle cx="110" cy="150" r="9"/>
    <circle cx="160" cy="190" r="11"/>
    <circle cx="220" cy="160" r="8"/>
    <circle cx="130" cy="240" r="10"/>
    <circle cx="200" cy="230" r="7"/>
    <circle cx="250" cy="210" r="9"/>
    <circle cx="90" cy="200" r="6"/>
    <circle cx="175" cy="280" r="8"/>
  </g>

  <!-- brain in the middle -->
  <g transform="translate(380,200)">
    <circle cx="0" cy="0" r="52" fill="#FFFFFF" stroke="#2E6FB7" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-size="34">🧠</text>
    <text x="0" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#0B1F3A">sleep</text>
  </g>
  <text x="380" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#0B1F3A">🌙 While you sleep</text>
  <text x="380" y="122" text-anchor="middle" font-size="12" fill="#33506e">replay · sort · discard noise</text>

  <!-- arrows in and out of brain -->
  <g stroke="#2E6FB7" stroke-width="2.5" fill="none" marker-end="url(#arr3)">
    <path d="M 270 200 L 322 200"/>
    <path d="M 438 200 L 490 200"/>
  </g>

  <!-- NIGHT side: organized memories -->
  <text x="585" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#cfe2f7">organized memory</text>
  <text x="585" y="74" text-anchor="middle" font-size="13" fill="#9cc3ef">the important bits, filed</text>
  <text x="585" y="92" text-anchor="middle" font-size="13" fill="#9cc3ef">into long-term memory</text>

  <!-- neat stacked bars -->
  <g fill="#7FB2EE">
    <rect x="520" y="150" width="130" height="16" rx="4"/>
    <rect x="520" y="178" width="130" height="16" rx="4"/>
    <rect x="520" y="206" width="130" height="16" rx="4"/>
    <rect x="520" y="234" width="100" height="16" rx="4"/>
  </g>

  <text x="380" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1F3A">Anthropic gave Claude this same trick — and called it Dreaming</text>
</svg>
